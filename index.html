<style>
body {
    font-family: Arial;
    background: #000;
    color: #66cdaa; /* greenish-aqua */
    margin: 0;
}

/* Header */
header {
    padding: 60px 20px;
    background-image: url("Lonely Tree 2.png");
    background-size: cover;
    background-position: center;
    text-align: center;
}

h1 {
    font-size: 42px;
    margin: 0;
}

.tagline {
    color: #000;
    margin-top: 10px;
}

/* Sections with full-width background */
section {
    width: 100%;
    padding: 40px 0; /* remove side padding so background spans edge to edge */
    background-size: cover;
    background-position: center;
}

/* Centered, narrow content inside sections */
.section-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px; /* optional padding inside narrow content */
    text-align: center;
}

.track {
    margin-bottom: 35px;
}

audio {
    width: 100%;
    margin-top: 10px;
}

footer {
    margin-top: 60px;
    padding: 30px;
    background: #111;
    color: #777;
}
</style>

<section style="background-image: url('R hologram background.png');">
  <div class="section-content">
    <h2>Demo Tracks</h2>

    <div class="track">
      <p>After the Pain (main soundtrack)</p>
      <audio controls>
        <source src="Above the Pain.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="track">
      <p>Credits (from After the Pain)</p>
      <audio controls>
        <source src="AtP Credits.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="track">
      <p>Sci-Fi Atmosphere experiment</p>
      <audio controls>
        <source src="STRAYLIGHT.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>
</section>
